<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>设备检查工作台</title>
    <!-- Offline Assets -->
    <script src="/static/js/tailwind.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1d4ed8',   // 蓝色，适合按钮
                        success: '#15803d',   // 绿色，正常状态
                        danger: '#b91c1c',    // 红色，异常状态
                        warning: '#b45309',   // 橙色，警告状态
                        darkBg: '#0f172a',    // 深色背景，高对比度
                        cardBg: '#1e293b',    // 卡片背景
                    }
                }
            }
        }
    </script>
    <style>
        /* 自定义高对比度基础样式 */
        body {
            background-color: #0f172a;
            /* 默认暗色高对比度环境，适应现场光线不足 */
            color: #f8fafc;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        /* 隐藏原生的复选框，使用自定义开关 */
        /* 默认未勾选 = 异常状态（红色） */
        .toggle-label {
            background-color: #b91c1c;
        }

        .toggle-checkbox:checked {
            right: 0;
            border-color: #15803d;
        }

        .toggle-checkbox:checked+.toggle-label {
            background-color: #15803d;
        }

        /* 状态文字样式 */
        .status-text-abnormal {
            color: #f87171;
            font-weight: 700;
        }

        .status-text-normal {
            color: #4ade80;
            font-weight: 700;
        }

        /* 页面加载骨架屏动画 */
        .skeleton {
            background: linear-gradient(-45deg, #1e293b, #334155, #1e293b, #334155);
            background-size: 400% 400%;
            animation: skeleton-loading 1.2s ease infinite;
        }

        @keyframes skeleton-loading {
            0% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0 50%;
            }
        }
    </style>
</head>

<body class="min-h-screen flex justify-center bg-darkBg pb-24">

    <!-- 主容器：手机全屏，PC 端居中窄卡片 -->
    <div
        class="w-full max-w-lg bg-cardBg shadow-2xl flex flex-col min-h-screen sm:min-h-0 sm:mt-6 sm:rounded-2xl sm:overflow-hidden sm:h-fit relative">

        <!-- 顶部导航栏 -->
        <header class="bg-slate-800 p-5 flex items-center justify-between border-b border-slate-700 top-0 sticky z-10">
            <h1 class="text-xl font-bold tracking-wider">现场检查作业</h1>
            <svg class="w-6 h-6 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
            </svg>
        </header>

        <!-- 加载状态展示 -->
        <div id="loadingState" class="p-6 space-y-6">
            <div class="h-8 skeleton rounded w-2/3"></div>
            <div class="h-4 skeleton rounded w-1/2"></div>
            <div class="h-24 skeleton rounded mt-6"></div>
        </div>

        <!-- 错误状态展示 -->
        <div id="errorState" class="hidden p-6 text-center mt-10">
            <svg class="w-16 h-16 text-danger mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
            <h2 class="text-2xl font-bold text-red-500 mb-2">获取设备失败</h2>
            <p id="errorMessage" class="text-slate-400 text-lg">无法加载设备信息，请检查网络或二维码是否有效。</p>
            <button onclick="fetchDeviceData()"
                class="mt-8 px-6 py-3 bg-slate-700 rounded-lg font-bold text-white hover:bg-slate-600">重试</button>
        </div>

        <!-- 设备内容展示区 -->
        <div id="contentState" class="hidden flex-1 flex flex-col">

            <!-- 模块1：设备头部信息 -->
            <div class="p-6 border-b border-slate-700 bg-slate-800">
                <div class="flex justify-between items-start mb-2">
                    <h2 id="deviceName" class="text-3xl font-extrabold text-white leading-tight">加载中...</h2>
                    <span id="deviceStatus"
                        class="px-3 py-1 text-sm font-bold rounded-full bg-slate-700 text-slate-300 border border-slate-600">
                        --
                    </span>
                </div>
                <div class="flex items-center text-slate-400 mt-3 text-lg">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z">
                        </path>
                    </svg>
                    <span>编号: <span id="deviceSn"
                            class="font-mono font-bold text-slate-300 tracking-wide">--</span></span>
                </div>
            </div>

            <!-- 模块2：检查操作表单 -->
            <form id="inspectionForm" class="p-6 pb-64 flex-1 space-y-6">
                <!-- 模板选择区 -->
                <div id="templateSelection" class="hidden mb-6 bg-slate-800 p-4 rounded-xl border border-slate-600">
                    <label class="block text-xl font-bold text-primary mb-3">📌 本次要执行的检查计划</label>
                    <div class="relative">
                        <select id="selectedTemplate" onchange="renderChecklistByTemplate()"
                            class="w-full bg-slate-900 text-white text-lg p-4 rounded-xl border border-slate-600 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all appearance-none cursor-pointer pr-10 shadow-inner">
                            <option value="">-- 请选择检查计划 --</option>
                        </select>
                        <div
                            class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-slate-400">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M19 9l-7 7-7-7"></path>
                            </svg>
                        </div>
                    </div>
                </div>

                <h3 class="text-xl font-bold text-slate-300 border-l-4 border-primary pl-3 mb-6" id="itemsTitle">检查项目
                </h3>

                <!-- 动态检查项容器 -->
                <div id="dynamicCheckItems" class="space-y-4">
                    <!-- 检查项将通过 JS 动态生成并插入到此处 -->
                </div>

                <!-- 备注输入框已删除 -->
            </form>

            <!-- 底部提交按钮区域 (固定位置) -->
            <div
                class="fixed bottom-0 left-0 right-0 sm:absolute sm:bottom-0 p-4 bg-slate-800 border-t border-slate-700 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.3)] z-50">
                <button type="button" onclick="submitInspection()"
                    class="w-full bg-primary hover:bg-blue-600 active:bg-blue-800 text-white font-bold text-2xl py-5 rounded-xl transition-colors shadow-lg flex justify-center items-center">
                    <svg class="w-7 h-7 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                        xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                    一切正常 提交
                </button>
                <button type="button" onclick="goToRepair()"
                    class="w-full mt-4 bg-danger hover:bg-red-600 active:bg-red-800 text-white font-bold text-2xl py-5 rounded-xl transition-colors shadow-lg flex justify-center items-center">
                    <svg class="w-7 h-7 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z">
                        </path>
                    </svg>
                    设备异常 报修
                </button>
            </div>

        </div>
    </div>

    <script>
        // 配置后端 API 基础地址（动态获取当前站点地址，增强兼容性）
        const API_BASE_URL = window.location.origin;

        // 获取 DOM 元素
        const elLoading = document.getElementById('loadingState');
        const elError = document.getElementById('errorState');
        const elContent = document.getElementById('contentState');

        const elDeviceName = document.getElementById('deviceName');
        const elDeviceSn = document.getElementById('deviceSn');
        const elDeviceStatus = document.getElementById('deviceStatus');
        const elErrorMsg = document.getElementById('errorMessage');

        // ==== 核心逻辑 1：解析 URL 提取 ID ====
        function getDeviceIdFromUrl() {
            // 假设 URL 格式为: http://localhost/inspect/12345-uuid-67890
            const pathParts = window.location.pathname.split('/').filter(p => p);

            // 如果路径中存在 inspect，则取它后面的那一部分作为 ID
            const inspectIndex = pathParts.indexOf('inspect');

            if (inspectIndex !== -1 && inspectIndex < pathParts.length - 1) {
                return pathParts[inspectIndex + 1];
            }

            // 用于本地直接打开 HTML 文件测试的回退逻辑：尝试从 query 参数中获取 ?id=xxx
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('id');
        }

        // ==== 核心逻辑 2：获取后端设备数据 ====
        async function fetchDeviceData() {
            const deviceId = getDeviceIdFromUrl();

            if (!deviceId) {
                showError("无效的设备链接：未找到设备 ID。");
                return;
            }

            // UI 切换到加载状态
            elError.classList.add('hidden');
            elContent.classList.add('hidden');
            elLoading.classList.remove('hidden');

            try {
                // 调用后端 /devices/{id} 接口
                const response = await fetch(`${API_BASE_URL}/devices/${deviceId}`);

                if (!response.ok) {
                    if (response.status === 404) {
                        throw new Error(`设备未找到 (UUID: ${deviceId})`);
                    }
                    throw new Error(`系统异常，错误代码：${response.status}`);
                }

                const deviceData = await response.json();
                renderDeviceData(deviceData);

            } catch (error) {
                console.error("加载数据失败:", error);
                showError(error.message);
            }
        }

        // ==== 核心逻辑 3：渲染数据到页面 ====
        function renderDeviceData(device) {
            elDeviceName.textContent = device.name || '未知设备';
            elDeviceSn.textContent = device.sn || '---';

            // 设置状态标签的样式和文本
            elDeviceStatus.textContent = device.status;
            elDeviceStatus.className = "px-4 py-1.5 text-sm font-extrabold rounded-full border shadow-sm ";

            if (device.status === '运行中') {
                elDeviceStatus.className += "bg-success/20 text-green-400 border-green-500/50";
            } else if (device.status === '停机') {
                elDeviceStatus.className += "bg-danger/20 text-red-400 border-red-500/50";
            } else if (device.status === '维护') {
                elDeviceStatus.className += "bg-warning/20 text-orange-400 border-orange-500/50";
            } else {
                elDeviceStatus.className += "bg-slate-700 text-slate-300 border-slate-600";
            }

            // 动态渲染检查项
            // 保存当前设备的模板数据用于切换
            window.currentDeviceTemplates = device.templates || [];

            const selectionDiv = document.getElementById('templateSelection');
            const selectEl = document.getElementById('selectedTemplate');

            if (window.currentDeviceTemplates.length > 1) {
                // 如果有多套模板，显示选择器，并默认不展示任何检查项
                selectionDiv.classList.remove('hidden');
                selectEl.innerHTML = '<option value="">-- 请首选检查计划 --</option>';
                window.currentDeviceTemplates.forEach(tpl => {
                    selectEl.innerHTML += `<option value="${tpl.id}">${tpl.name} [${tpl.period_hours}H周期]</option>`;
                });
                document.getElementById('dynamicCheckItems').innerHTML = `
                    <div class="p-4 bg-slate-800/50 rounded-xl border border-slate-700 border-dashed text-center">
                        <p class="text-slate-400">请优先从上方选择本次要执行的检查计划。</p>
                    </div>
                `;
            } else if (window.currentDeviceTemplates.length === 1) {
                // 如果只有一套模板，隐藏选择器，直接渲染该模板项
                selectionDiv.classList.add('hidden');
                selectEl.innerHTML = `<option value="${window.currentDeviceTemplates[0].id}" selected>${window.currentDeviceTemplates[0].name}</option>`;
                renderChecklistByTemplateId(window.currentDeviceTemplates[0].id);
            } else {
                // 回退显示，当设备没有分配任何检查计划时
                selectionDiv.classList.add('hidden');
                selectEl.innerHTML = '<option value="">系统未绑定</option>';
                const container = document.getElementById('dynamicCheckItems');
                container.innerHTML = `
                    <div class="p-4 bg-slate-800/50 rounded-xl border border-slate-700 border-dashed text-center">
                        <p class="text-slate-400">该设备未绑定专属检查计划，无需勾选具体的检查项要求，请直接在下方填写检查备注与结果。</p>
                    </div>
                `;
            }

            // 切换 UI 显示
            elLoading.classList.add('hidden');
            elContent.classList.remove('hidden');
        }

        function renderChecklistByTemplate() {
            const selectEl = document.getElementById('selectedTemplate');
            const tplId = parseInt(selectEl.value);
            if (!tplId) {
                document.getElementById('dynamicCheckItems').innerHTML = `
                    <div class="p-4 bg-slate-800/50 rounded-xl border border-slate-700 border-dashed text-center">
                        <p class="text-slate-400">请优先从上方选择本次要执行的检查计划。</p>
                    </div>
                `;
                return;
            }
            renderChecklistByTemplateId(tplId);
        }

        function renderChecklistByTemplateId(tplId) {
            const container = document.getElementById('dynamicCheckItems');
            container.innerHTML = ''; // 清空之前的数据
            const targetTpl = window.currentDeviceTemplates.find(t => t.id === tplId);

            if (targetTpl && targetTpl.items && targetTpl.items.length > 0) {
                targetTpl.items.forEach((item, index) => {
                    const toggleId = `toggle_${index}`;
                    const statusId = `status_${index}`;
                    const html = `
                        <div class="flex items-center justify-between p-4 bg-slate-800 rounded-xl border border-red-500/50" id="card_${index}">
                            <div>
                                <p class="text-xl font-bold text-white">${item}</p>
                                <span id="${statusId}" class="status-text-abnormal text-sm mt-1 inline-block">⚠ 异常</span>
                            </div>
                            <div class="relative inline-block w-14 mr-2 align-middle select-none transition duration-200 ease-in">
                                <input type="checkbox" name="dynamic_item_${index}" value="${item}" id="${toggleId}" class="dynamic-check-item toggle-checkbox absolute block w-7 h-7 rounded-full bg-white border-4 border-red-500 appearance-none cursor-pointer transition-all duration-300 checked:right-0 checked:border-success z-10" onchange="updateItemStatus(${index})"/>
                                <label for="${toggleId}" class="toggle-label block overflow-hidden h-7 rounded-full cursor-pointer transition-colors duration-300"></label>
                            </div>
                        </div>
                    `;
                    container.insertAdjacentHTML('beforeend', html);
                });
            } else {
                container.innerHTML = `
                    <div class="p-4 bg-slate-800/50 rounded-xl border border-slate-700 border-dashed text-center">
                        <p class="text-slate-400">此项目模板内暂未录入任何核查项要求。</p>
                    </div>
                `;
            }
        }

        // ==== 辅助函数：更新检查项的状态显示 ====
        function updateItemStatus(index) {
            const checkbox = document.getElementById(`toggle_${index}`);
            const statusEl = document.getElementById(`status_${index}`);
            const cardEl = document.getElementById(`card_${index}`);
            if (checkbox.checked) {
                // 正常状态
                statusEl.textContent = '✓ 正常';
                statusEl.className = 'status-text-normal text-sm mt-1 inline-block';
                cardEl.className = 'flex items-center justify-between p-4 bg-slate-800 rounded-xl border border-green-500/50';
                checkbox.classList.remove('border-red-500');
                checkbox.classList.add('border-success');
            } else {
                // 异常状态
                statusEl.textContent = '⚠ 异常';
                statusEl.className = 'status-text-abnormal text-sm mt-1 inline-block';
                cardEl.className = 'flex items-center justify-between p-4 bg-slate-800 rounded-xl border border-red-500/50';
                checkbox.classList.remove('border-success');
                checkbox.classList.add('border-red-500');
            }
        }

        function showError(msg) {
            elLoading.classList.add('hidden');
            elContent.classList.add('hidden');
            elErrorMsg.textContent = msg;
            elError.classList.remove('hidden');
        }

        // ==== 核心逻辑 4：提交检查表单 ====
        function submitInspection() {
            const form = document.getElementById('inspectionForm');
            const selectEl = document.getElementById('selectedTemplate');

            const templateId = selectEl && selectEl.value ? parseInt(selectEl.value) : null;

            if (window.currentDeviceTemplates && window.currentDeviceTemplates.length > 1 && !templateId) {
                alert("请在上方下拉框中选用一项【要执行的检查计划】再行提交。");
                return;
            }

            // 动态收集所有检查项结果
            const checklist = [];
            document.querySelectorAll('.dynamic-check-item').forEach(checkbox => {
                checklist.push({
                    item_name: checkbox.value,
                    is_normal: checkbox.checked
                });
            });

            const data = {
                device_id: getDeviceIdFromUrl(),
                template_id: templateId,
                checklist: checklist,
                timestamp: new Date().toISOString()
            };

            // 模拟提交的按钮动效
            const btn = document.querySelector('button[onclick="submitInspection()"]');
            const originalText = btn.innerHTML;
            btn.innerHTML = `
                <svg class="animate-spin -ml-1 mr-3 h-6 w-6 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                  <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                  <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                正在提交...
            `;
            btn.disabled = true;
            btn.classList.add('opacity-80', 'cursor-not-allowed');

            // 真实的 POST API 调用：将结构化日志保存到后端
            fetch(`${API_BASE_URL}/inspections/`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(data)
            })
                .then(res => {
                    if (!res.ok) throw new Error('网络请求异常，服务器拒绝');
                    return res.json();
                })
                .then(result => {
                    console.log("检查日志保存成功:", result);

                    // 恢复按钮并显示成功状态
                    btn.innerHTML = `
                    <svg class="w-7 h-7 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                    </svg>
                    提交成功
                `;
                    btn.classList.replace('bg-primary', 'bg-success');
                    btn.classList.replace('hover:bg-blue-600', 'bg-success');

                    // 2 秒后复原并刷新页面最新状态
                    setTimeout(() => {
                        btn.innerHTML = originalText;
                        btn.classList.replace('bg-success', 'bg-primary');
                        btn.disabled = false;
                        btn.classList.remove('opacity-80', 'cursor-not-allowed');

                        fetchDeviceData();
                    }, 2000);
                })
                .catch(error => {
                    console.error("提交失败:", error);
                    alert("检查提交失败请重试: " + error.message);

                    // 失败场景：允许重新点击按钮
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                    btn.classList.remove('opacity-80', 'cursor-not-allowed');
                });
        }

        function goToRepair() {
            const deviceId = getDeviceIdFromUrl();
            window.location.href = `/repair/${deviceId}`;
        }

        // ==== 初始化页面 ====
        window.addEventListener('DOMContentLoaded', () => {
            fetchDeviceData();
        });
    </script>
</body>

</html>
