<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统鉴权 - 河北京车 设备管理</title>
    <style>
        :root {
            --brand-50: #eff6ff;
            --brand-100: #dbeafe;
            --brand-400: #60a5fa;
            --brand-500: #3b82f6;
            --brand-600: #2563eb;
            --brand-700: #1d4ed8;
            --slate-50: #f8fafc;
            --slate-100: #f1f5f9;
            --slate-200: #e2e8f0;
            --slate-300: #cbd5e1;
            --slate-400: #94a3b8;
            --slate-500: #64748b;
            --slate-600: #475569;
            --slate-700: #334155;
            --slate-800: #1e293b;
            --white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--slate-50);
            background-image:
                radial-gradient(at 0% 0%, hsla(210, 100%, 93%, 1) 0, transparent 50%),
                radial-gradient(at 100% 0%, hsla(210, 100%, 93%, 1) 0, transparent 50%),
                radial-gradient(at 100% 100%, hsla(210, 100%, 93%, 1) 0, transparent 50%),
                radial-gradient(at 0% 100%, hsla(210, 100%, 93%, 1) 0, transparent 50%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .login-container {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 440px;
            padding: 3rem 2.5rem;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from {
                transform: translateY(20px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 2.5rem;
        }

        .logo-box {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--brand-500), var(--brand-700));
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
            box-shadow: 0 8px 16px -4px rgba(37, 99, 235, 0.3);
            color: white;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--slate-800);
            letter-spacing: -0.02em;
        }

        .header h1 span {
            color: var(--brand-600);
        }

        .welcome-text {
            text-align: center;
            margin-bottom: 2rem;
        }

        .welcome-text h2 {
            font-size: 1.25rem;
            color: var(--slate-800);
            margin-bottom: 0.25rem;
        }

        .welcome-text p {
            font-size: 0.875rem;
            color: var(--slate-400);
            letter-spacing: 0.05em;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--slate-600);
            margin-bottom: 0.5rem;
            padding-left: 0.25rem;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--slate-400);
            width: 20px;
            height: 20px;
            pointer-events: none;
        }

        .form-input {
            width: 100%;
            padding: 0.875rem 1rem 0.875rem 3rem;
            background: var(--slate-50);
            border: 1px solid var(--slate-200);
            border-radius: 1rem;
            font-size: 1rem;
            color: var(--slate-800);
            transition: all 0.2s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--brand-400);
            background: white;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        .submit-btn {
            width: 100%;
            padding: 1rem;
            background: var(--brand-600);
            color: white;
            border: none;
            border-radius: 1rem;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-top: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            box-shadow: 0 10px 20px -5px rgba(37, 99, 235, 0.3);
        }

        .submit-btn:hover {
            background: var(--brand-700);
            transform: translateY(-1px);
            box-shadow: 0 15px 30px -8px rgba(37, 99, 235, 0.4);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .submit-btn:disabled {
            background: var(--slate-400);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .hint {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.75rem;
            color: var(--slate-400);
            font-weight: 500;
        }

        .spinner {
            animation: rotate 1s linear infinite;
            width: 20px;
            height: 20px;
        }

        @keyframes rotate {
            100% {
                transform: rotate(360deg);
            }
        }

        .shake {
            animation: shake 0.4s cubic-bezier(.36, .07, .19, .97) both;
        }

        @keyframes shake {

            10%,
            90% {
                transform: translate3d(-1px, 0, 0);
            }

            20%,
            80% {
                transform: translate3d(2px, 0, 0);
            }

            30%,
            50%,
            70% {
                transform: translate3d(-4px, 0, 0);
            }

            40%,
            60% {
                transform: translate3d(4px, 0, 0);
            }
        }
    </style>
</head>

<body>
    <div class="login-container" id="loginCard">
        <div class="header">
            <div class="logo-box">
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="4" y="4" width="16" height="16" rx="2" />
                    <rect x="9" y="9" width="6" height="6" />
                    <path d="M9 1v3" />
                    <path d="M15 1v3" />
                    <path d="M9 20v3" />
                    <path d="M15 20v3" />
                    <path d="M20 9h3" />
                    <path d="M20 15h3" />
                    <path d="M1 9h3" />
                    <path d="M1 15h3" />
                </svg>
            </div>
            <h1>河北京车 <span>设备管理</span></h1>
        </div>

        <div class="welcome-text">
            <h2>欢迎回来</h2>
            <p>企业级核心设备管控台</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label class="form-label" for="username">管理员账号</label>
                <div class="input-wrapper">
                    <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2" />
                        <circle cx="12" cy="7" r="4" />
                    </svg>
                    <input type="text" id="username" class="form-input" placeholder="请输入账号" required
                        autocomplete="username">
                </div>
            </div>
            <div class="form-group">
                <label class="form-label" for="password">管理密码</label>
                <div class="input-wrapper">
                    <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                        <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                    </svg>
                    <input type="password" id="password" class="form-input" placeholder="请输入密码" required
                        autocomplete="current-password">
                </div>
            </div>

            <button type="submit" id="submitBtn" class="submit-btn">
                <span>立即登录系统</span>
            </button>
        </form>

        <div class="hint">
            提示: 本地演示环境使用 admin / admin 登录
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const loginCard = document.getElementById('loginCard');
            const btn = document.getElementById('submitBtn');
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;

            // Loading state
            btn.disabled = true;
            btn.innerHTML = '<svg class="spinner" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg> 正在验证身份...';

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: u, password: p })
                });

                if (res.ok) {
                    window.location.href = '/dashboard';
                } else {
                    const data = await res.json();

                    // Error feedback
                    loginCard.classList.add('shake');
                    setTimeout(() => loginCard.classList.remove('shake'), 500);

                    alert(data.detail || "账号或密码错误");
                    resetBtn();
                }
            } catch (err) {
                alert('网络连接超时，请检查后端服务是否正常解析。');
                resetBtn();
            }

            function resetBtn() {
                btn.disabled = false;
                btn.innerHTML = '<span>立即登录系统</span>';
            }
        });
    </script>
</body>

</html>
