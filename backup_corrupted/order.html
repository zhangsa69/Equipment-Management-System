<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>维修工单详情 - 设备管理中心</title>
    <!-- Offline Assets -->
    <script src="/static/js/tailwind.min.js"></script>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: system-ui, sans-serif;
        }
    </style>
</head>

<body class="min-h-screen py-8 px-4">
    <div class="max-w-xl mx-auto bg-slate-800 rounded-3xl shadow-2xl overflow-hidden border border-slate-700">
        <div id="loading" class="p-12 text-center text-slate-400">正在拉取工单状态...</div>

        <div id="content" class="hidden">
            <header class="p-6 border-b border-slate-700 bg-slate-800/50 flex justify-between items-center">
                <h1 class="text-xl font-bold text-white tracking-widest">工单详情</h1>
                <span id="orderStatus" class="px-4 py-1.5 text-sm font-black rounded-full shadow-sm">--</span>
            </header>

            <div class="p-6 space-y-6">
                <!-- 模块：报修基础背景 -->
                <div class="bg-slate-900/40 rounded-2xl border border-slate-700/50 p-5 space-y-6">
                    <div class="grid grid-cols-2 gap-y-6 gap-x-4">
                        <!-- 第一行 -->
                        <div class="col-span-1">
                            <p
                                class="text-[10px] text-slate-500 uppercase font-black tracking-widest mb-1 items-center flex">
                                <span class="w-1.5 h-1.5 rounded-full bg-blue-500 mr-1.5"></span>所属设备
                            </p>
                            <p id="deviceName" class="text-lg font-bold text-white">--</p>
                        </div>
                        <div class="col-span-1">
                            <p
                                class="text-[10px] text-slate-500 uppercase font-black tracking-widest mb-1 items-center flex">
                                <span class="w-1.5 h-1.5 rounded-full bg-amber-500 mr-1.5"></span>负责部门
                            </p>
                            <p id="deptName" class="text-lg font-bold text-amber-400">--</p>
                        </div>
                        <!-- 第二行 -->
                        <div class="col-span-1">
                            <p
                                class="text-[10px] text-slate-500 uppercase font-black tracking-widest mb-1 items-center flex">
                                <span class="w-1.5 h-1.5 rounded-full bg-purple-500 mr-1.5"></span>报修人
                            </p>
                            <p id="reporterName" class="text-lg font-bold text-white">--</p>
                        </div>
                        <div class="col-span-1">
                            <p
                                class="text-[10px] text-slate-500 uppercase font-black tracking-widest mb-1 items-center flex">
                                <span class="w-1.5 h-1.5 rounded-full bg-slate-500 mr-1.5"></span>报修时间
                            </p>
                            <p id="orderTime" class="text-sm font-mono text-slate-400">--</p>
                        </div>
                    </div>

                    <!-- 故障描述 - 全宽 -->
                    <div class="pt-4 border-t border-slate-800/60">
                        <p
                            class="text-[10px] text-slate-500 uppercase font-black tracking-widest mb-2 flex items-center">
                            <span class="w-1.5 h-1.5 rounded-full bg-red-500 mr-1.5"></span>故障现象描述
                        </p>
                        <div id="description"
                            class="text-base text-slate-300 leading-relaxed bg-slate-950/40 p-4 rounded-xl border border-slate-800/80">
                            --</div>
                    </div>
                </div>

                <hr class="border-slate-700">

                <!-- 班长派单区 (仅在 待处理 状态显示) -->
                <div id="dispatchSection" class="hidden space-y-4">
                    <h3 class="text-amber-400 font-black text-xl flex items-center">
                        <span class="mr-2">⏬</span> 班长派单
                    </h3>
                    <div class="bg-amber-400/5 p-6 rounded-2xl border border-amber-400/20">
                        <label class="block text-amber-400 text-sm font-bold mb-2">选择维修执行人</label>
                        <div class="relative">
                            <input type="text" id="repairmanSearch" autocomplete="off"
                                class="w-full bg-slate-950 border border-slate-700 rounded-xl px-4 py-4 text-white text-lg focus:ring-2 focus:ring-amber-500 outline-none mb-2"
                                placeholder="输入姓名搜索维修人员...">
                            <ul id="repairmanList"
                                class="hidden absolute top-full left-0 right-0 bg-slate-900 border border-slate-700 rounded-xl mt-1 z-50 max-h-48 overflow-y-auto shadow-2xl">
                                <!-- 动态列表 -->
                            </ul>
                            <input type="hidden" id="repairmanSelect" required>
                        </div>
                        <button onclick="dispatchOrder()"
                            class="w-full bg-amber-500 hover:bg-amber-600 active:bg-amber-700 text-white font-black text-2xl py-6 rounded-2xl transition-all shadow-lg flex justify-center items-center">
                            🛠️ 确认并派发任务
                        </button>
                    </div>
                </div>

                <!-- 维修完工区 (仅在 维修中 状态显示) -->
                <div id="completeSection" class="hidden space-y-4">
                    <h3 class="text-emerald-400 font-black text-xl flex items-center">
                        <span class="mr-2">🧰</span> 维修结果提交
                    </h3>
                    <div class="bg-emerald-400/5 p-6 rounded-2xl border border-emerald-400/20">
                        <label class="block text-emerald-400 text-sm font-bold mb-2">维修记录 (选填)</label>
                        <textarea id="repairNotes" rows="3"
                            class="w-full bg-slate-950 border border-slate-700 rounded-xl px-4 py-3 text-white text-md focus:ring-2 focus:ring-emerald-500 outline-none mb-4 placeholder-slate-600"
                            placeholder="请简要描述维修过程或更换的配件..."></textarea>

                        <button onclick="completeOrder()"
                            class="w-full bg-emerald-600 hover:bg-emerald-700 active:bg-emerald-800 text-white font-black text-2xl py-6 rounded-2xl transition-all shadow-lg flex justify-center items-center">
                            ✅ 维修完成提交
                        </button>
                    </div>
                </div>

                <!-- 已完工状态展示 -->
                <div id="finishSection" class="hidden p-12 text-center text-slate-500 bg-slate-900 rounded-2xl italic">
                    🎉 该工单已完成处理，设备目前运行正常。
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = window.location.origin;
        const orderId = window.location.pathname.split('/').pop();

        async function fetchDetail() {
            try {
                const res = await fetch(`${API_BASE_URL}/orders/${orderId}`);
                if (!res.ok) {
                    alert("工单不存在或已删除");
                    return;
                }
                const order = await res.json();
                renderDetail(order);
            } catch (err) {
                console.error(err);
                alert("加载工单失败");
            }
        }

        let usersList = [];
        const searchInput = document.getElementById('repairmanSearch');
        const searchList = document.getElementById('repairmanList');
        const hiddenIdInput = document.getElementById('repairmanSelect');

        async function fetchUsers() {
            try {
                const res = await fetch(`${API_BASE_URL}/users/`);
                usersList = await res.json();
            } catch (err) { }
        }

        // 搜索逻辑
        searchInput.oninput = (e) => {
            const kw = e.target.value.trim().toLowerCase();
            if (!kw) { searchList.classList.add('hidden'); return; }
            const matches = usersList.filter(u => u.name.toLowerCase().includes(kw));
            if (matches.length > 0) {
                searchList.innerHTML = matches.map(u => `<li onclick="selectUser('${u.id}', '${u.name}')" class="p-4 hover:bg-slate-700 border-b border-slate-800 cursor-pointer text-slate-200">
                    <span class="font-bold">${u.name}</span>
                    <span class="block text-xs text-slate-500">${u.id}</span>
                </li>`).join('');
                searchList.classList.remove('hidden');
            } else {
                searchList.classList.add('hidden');
            }
        };

        function selectUser(id, name) {
            hiddenIdInput.value = id;
            searchInput.value = name;
            searchList.classList.add('hidden');
        }

        document.onclick = (e) => {
            if (e.target !== searchInput) searchList.classList.add('hidden');
        };

        function renderDetail(order) {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('content').classList.remove('hidden');

            document.getElementById('deviceName').textContent = order.device ? order.device.name : '未知设备';
            document.getElementById('deptName').textContent = (order.device && order.device.dept) ? order.device.dept : '未分类';
            document.getElementById('reporterName').textContent = order.reporter ? order.reporter.name : '匿名报修';

            // 格式化时间内容
            if (order.created_at) {
                const dt = new Date(order.created_at + 'Z');
                document.getElementById('orderTime').textContent = dt.toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
            }

            document.getElementById('description').textContent = order.description;

            const statusEl = document.getElementById('orderStatus');
            statusEl.textContent = order.status;

            // 样式处理
            if (order.status === '待处理') {
                statusEl.className += " bg-red-600/20 text-red-400 border border-red-500/50";
                document.getElementById('dispatchSection').classList.remove('hidden');
            } else if (order.status === '维修中') {
                statusEl.className += " bg-amber-600/20 text-amber-400 border border-amber-500/50";
                document.getElementById('completeSection').classList.remove('hidden');
            } else if (order.status === '已完成') {
                statusEl.className += " bg-emerald-600/20 text-emerald-400 border border-emerald-500/50";
                document.getElementById('finishSection').classList.remove('hidden');
            }
        }

        async function dispatchOrder() {
            const repairmanId = document.getElementById('repairmanSelect').value;
            if (!repairmanId) {
                alert("请选择一名维修人员");
                return;
            }
            try {
                const res = await fetch(`${API_BASE_URL}/orders/${orderId}/dispatch`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ repairman_id: repairmanId })
                });
                if (res.ok) {
                    alert("✅ 派单成功！已实时通知该技术员至现场处理。");
                    location.reload();
                } else {
                    alert("派单失败");
                }
            } catch (err) {
                alert("请求失败");
            }
        }

        async function completeOrder() {
            const notes = document.getElementById('repairNotes').value;
            if (!confirm("确认维修已完成，并将设备重新标识为正常状态？")) return;
            try {
                const res = await fetch(`${API_BASE_URL}/orders/${orderId}/complete`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ repair_notes: notes })
                });
                if (res.ok) {
                    alert("✅ 维修结果已同步，设备已回归运行状态。");
                    location.reload();
                } else {
                    alert("完工失败");
                }
            } catch (err) {
                alert("请求失败");
            }
        }

        window.onload = () => {
            fetchDetail();
            fetchUsers();
        };
    </script>
</body>

</html>
