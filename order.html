<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>维修工单详情 - 设备管理中心</title>
    <!-- Assets -->
    <script src="/static/js/tailwind.min.js"></script>
    <script src="/static/js/lucide.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            600: '#2563eb',
                        },
                        surface: '#f8fafc',
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #f1f5f9; color: #0f172a; -webkit-tap-highlight-color: transparent; }
        
        .ui-label {
            font-size: 14px; font-weight: 900; color: #2563eb; text-transform: uppercase;
            letter-spacing: 0.05em; margin-bottom: 4px; display: block;
        }

        .ui-content {
            font-size: 14px; font-weight: 700; color: #0f172a;
        }

        .ui-input {
            width: 100%; background-color: white; border: 1px solid #e2e8f0; border-radius: 16px;
            padding: 16px; font-size: 14px; font-weight: 700; color: #0f172a; outline: none; transition: all 0.2s;
        }
        .ui-input:focus { border-color: #2563eb; box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }

        .ui-button-primary {
            width: 100%; background-color: #2563eb; color: white; font-size: 17px; font-weight: 900;
            padding: 20px; border-radius: 20px; transition: all 0.2s; display: flex; align-items: center; justify-content: center;
            gap: 8px; box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.2);
        }
        .ui-button-primary:active { transform: scale(0.98); }

        .status-badge { @apply px-4 py-1 rounded-lg text-[14px] font-black border shadow-sm; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .safe-area-inset-bottom { padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>

<body class="font-sans antialiased">
    <div class="max-w-md mx-auto min-h-screen bg-surface flex flex-col shadow-xl relative pb-32">
        
        <!-- Header -->
        <header class="sticky top-0 z-30 bg-white/80 backdrop-blur-md border-b border-slate-100 px-5 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <button onclick="history.back()" class="p-2 -ml-2 text-slate-900">
                    <i data-lucide="chevron-left" class="w-6 h-6"></i>
                </button>
                <h1 class="text-[17px] font-black text-slate-900 tracking-tight">工单执行详情</h1>
            </div>
            <div id="orderStatusBadge" class="status-badge">--</div>
        </header>

        <div id="loading" class="flex-1 flex flex-col items-center justify-center p-20 text-slate-900">
            <div class="w-8 h-8 border-4 border-slate-200 border-t-brand-600 rounded-full animate-spin mb-4"></div>
            <p class="text-[14px] font-black uppercase tracking-widest">调取工单中...</p>
        </div>

        <div id="content" class="hidden flex-1 flex flex-col">
            <!-- Order Details (Single Column) -->
            <div class="px-5 pt-6 space-y-6">
                <div class="bg-white rounded-3xl border border-slate-100 p-6 shadow-sm space-y-6">
                    <div>
                        <span class="ui-label">所属设备资产</span>
                        <p id="deviceName" class="ui-content text-[17px] font-black">--</p>
                    </div>
                    <div>
                        <span class="ui-label">归属负责部门</span>
                        <p id="deptName" class="ui-content">--</p>
                    </div>
                    <div>
                        <span class="ui-label">报修登记人员</span>
                        <p id="reporterName" class="ui-content flex items-center gap-2">--</p>
                    </div>
                    <div>
                        <span class="ui-label">系统记录时间</span>
                        <p id="orderTime" class="ui-content font-mono">--</p>
                    </div>
                    <div class="pt-5 border-t border-slate-50">
                        <span class="ui-label">故障现象描述</span>
                        <div id="description" class="ui-content bg-slate-50 p-5 rounded-2xl border border-slate-100">--</div>
                    </div>
                    <div id="photoSection" class="pt-5 border-t border-slate-50 hidden">
                        <span class="ui-label">现场故障照片</span>
                        <div id="photoGrid" class="grid grid-cols-3 gap-3 bg-slate-50 p-4 rounded-2xl border border-slate-100 mt-2"></div>
                    </div>
                </div>
            </div>

            <!-- Dispatch (Single Column) -->
            <div id="dispatchSection" class="hidden px-5 pt-8 space-y-4">
                <span class="ui-label">指派处理</span>
                <div class="bg-white rounded-3xl border border-brand-100 p-6 shadow-sm space-y-5">
                    <p class="text-[14px] font-black text-slate-900">请选择负责的技术人员：</p>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-4 flex items-center pointer-events-none">
                            <i data-lucide="search" class="w-5 h-5 text-brand-600"></i>
                        </div>
                        <input type="text" id="repairmanSearch" autocomplete="off" class="ui-input pl-12" placeholder="输入姓名搜索...">
                        <ul id="repairmanList" class="hidden absolute top-full left-0 right-0 bg-white border border-slate-100 rounded-2xl mt-2 z-50 max-h-56 overflow-y-auto shadow-2xl no-scrollbar"></ul>
                    </div>
                    <input type="hidden" id="repairmanSelect" required>
                </div>
            </div>

            <!-- Complete (Single Column) -->
            <div id="completeSection" class="hidden px-5 pt-8 space-y-4">
                <span class="ui-label">结果回填</span>
                <div class="bg-white rounded-3xl border border-slate-100 p-6 shadow-sm space-y-5">
                    <div>
                        <p class="text-[14px] font-black text-slate-900 mb-2">维修过程记录 (选填)</p>
                        <textarea id="repairNotes" rows="4" class="ui-input resize-none" placeholder="描述维修过程或配件更换..."></textarea>
                    </div>
                    <!-- Photo Upload Section -->
                    <div class="space-y-2 pt-4 border-t border-slate-50">
                        <div class="flex items-center justify-between">
                            <div class="flex items-center gap-2">
                                <i data-lucide="camera" class="w-5 h-5 text-brand-600"></i>
                                <span class="ui-label mb-0">完工证明拍照</span>
                            </div>
                        </div>
                        <div id="photoPreview" class="grid grid-cols-3 gap-3 mt-2" style="display:none;"></div>
                        <input type="file" id="photoInput" accept="image/*" capture="environment" multiple class="hidden" onchange="handlePhotoUpload(this)">
                        <button type="button" onclick="document.getElementById('photoInput').click()"
                            class="w-full bg-slate-50 border-2 border-dashed border-slate-200 rounded-2xl p-4 flex flex-col items-center gap-2 text-slate-400 hover:border-brand-600 hover:text-brand-600 transition-all active:scale-[0.98]">
                            <i data-lucide="image-plus" class="w-7 h-7"></i>
                            <span class="text-[14px] font-bold">点击上传完工证明照片</span>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Finished -->
            <div id="finishSection" class="hidden px-5 pt-8">
                <div class="bg-brand-50 rounded-3xl p-10 text-center flex flex-col items-center border border-brand-100">
                    <i data-lucide="check-circle-2" class="w-12 h-12 text-brand-600 mb-4"></i>
                    <h3 class="text-[17px] font-black text-slate-900">工单已成功关闭</h3>
                    <p class="text-slate-900 text-[14px] font-medium mt-1">维修任务已完成，设备运行正常。</p>
                </div>
            </div>
        </div>

        <!-- Fixed Action Footer -->
        <div id="actionFooter" class="hidden fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white/95 backdrop-blur-xl border-t border-slate-100 p-5 z-40">
            <button id="btnDispatch" onclick="dispatchOrder()" class="hidden ui-button-primary">
                <i data-lucide="send" class="w-6 h-6"></i>
                确认派发工单
            </button>
            <button id="btnComplete" onclick="completeOrder()" class="hidden ui-button-primary">
                <i data-lucide="check-circle-2" class="w-6 h-6"></i>
                提交完工
            </button>
        </div>
    </div>

    <script>
        const API_BASE_URL = window.location.origin;
        const orderId = window.location.pathname.split('/').pop();
        let usersList = [];
        let uploadedPhotos = [];
        function initIcons() { if (typeof lucide !== 'undefined') lucide.createIcons(); }

        async function fetchDetail() {
            try {
                const res = await fetch(`${API_BASE_URL}/orders/${orderId}`);
                const order = await res.json(); renderDetail(order);
            } catch (err) { alert("获取工单异常"); }
        }
        async function fetchUsers() { try { const res = await fetch(`${API_BASE_URL}/users/`); usersList = await res.json(); } catch (e) {} }

        const searchInput = document.getElementById('repairmanSearch');
        const searchList = document.getElementById('repairmanList');
        const hiddenIdInput = document.getElementById('repairmanSelect');
        searchInput.oninput = (e) => {
            const kw = e.target.value.trim().toLowerCase();
            if (!kw) { searchList.classList.add('hidden'); return; }
            const matches = usersList.filter(u => u.name.toLowerCase().includes(kw));
            if (matches.length > 0) {
                searchList.innerHTML = matches.map(u => `<li onclick="selectUser('${u.id}', '${u.name}')" class="p-4 hover:bg-slate-50 border-b border-slate-50 cursor-pointer flex items-center justify-between group"><span class="font-black text-slate-900 group-hover:text-brand-600">${u.name}</span><i data-lucide="plus" class="w-4 h-4 text-brand-600"></i></li>`).join('');
                searchList.classList.remove('hidden'); initIcons();
            } else { searchList.classList.add('hidden'); }
        };
        function selectUser(id, name) { hiddenIdInput.value = id; searchInput.value = name; searchList.classList.add('hidden'); }

        function renderDetail(order) {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('content').classList.remove('hidden');
            document.getElementById('deviceName').textContent = order.device ? order.device.name : '--';
            document.getElementById('deptName').textContent = (order.device && order.device.dept) ? order.device.dept : '--';
            document.getElementById('reporterName').textContent = order.reporter ? order.reporter.name : '--';
            if (order.created_at) { const dt = new Date(order.created_at + 'Z'); document.getElementById('orderTime').textContent = dt.toLocaleString('zh-CN'); }
            document.getElementById('description').textContent = order.description;
            
            // 渲染报修照片
            const photoSection = document.getElementById('photoSection');
            const photoGrid = document.getElementById('photoGrid');
            if (order.photos && order.photos.length > 0) {
                photoSection.classList.remove('hidden');
                photoGrid.innerHTML = order.photos.map(path => `
                    <div class="relative aspect-square rounded-xl overflow-hidden bg-white border border-slate-200 cursor-pointer">
                        <img src="${path}" class="w-full h-full object-cover" alt="故障照片" onclick="window.open('${path}', '_blank')">
                    </div>
                `).join('');
            } else {
                photoSection.classList.add('hidden');
            }

            const badge = document.getElementById('orderStatusBadge'); badge.textContent = order.status;
            const footer = document.getElementById('actionFooter');
            const btnDispatch = document.getElementById('btnDispatch');
            const btnComplete = document.getElementById('btnComplete');

            const isReadonly = new URLSearchParams(window.location.search).get('readonly') === 'true';

            if (order.status === '待处理') { 
                badge.className += " bg-red-50 text-red-600 border-red-100"; 
                if (!isReadonly) {
                    document.getElementById('dispatchSection').classList.remove('hidden');
                    footer.classList.remove('hidden');
                    btnDispatch.classList.remove('hidden');
                }
            }
            else if (order.status === '维修中') { 
                badge.className += " bg-amber-50 text-amber-600 border-amber-100"; 
                if (!isReadonly) {
                    document.getElementById('completeSection').classList.remove('hidden'); 
                    footer.classList.remove('hidden');
                    btnComplete.classList.remove('hidden');
                }
            }
            else if (order.status === '已完成') { 
                badge.className += " bg-brand-50 text-brand-600 border-brand-100"; 
                document.getElementById('finishSection').classList.remove('hidden'); 
            }
            initIcons();
        }

        async function dispatchOrder() {
            const rid = document.getElementById('repairmanSelect').value;
            if (!rid) return alert("请选择人员");
            try { const res = await fetch(`${API_BASE_URL}/orders/${orderId}/dispatch`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ repairman_id: rid }) }); if (res.ok) location.reload(); } catch (e) {}
        }
        async function handlePhotoUpload(input) {
            const files = input.files;
            if (!files.length) return;
            const preview = document.getElementById('photoPreview');
            preview.style.display = 'grid';
            for (const file of files) {
                const formData = new FormData();
                formData.append('file', file);
                const placeholder = document.createElement('div');
                placeholder.className = 'relative aspect-square rounded-2xl overflow-hidden bg-slate-100 flex items-center justify-center';
                placeholder.innerHTML = '<div class="w-6 h-6 border-2 border-brand-600/30 border-t-brand-600 rounded-full animate-spin"></div>';
                preview.appendChild(placeholder);
                try {
                    const res = await fetch('/api/upload-photo', { method: 'POST', body: formData });
                    const data = await res.json();
                    if (data.path) {
                        uploadedPhotos.push(data.path);
                    }
                    placeholder.innerHTML = `
                        <img src="${data.path}" class="w-full h-full object-cover" alt="完工照片">
                        <div class="absolute top-1 right-1 bg-emerald-500 text-white rounded-full w-5 h-5 flex items-center justify-center">
                            <i data-lucide="check" class="w-3 h-3"></i>
                        </div>`;
                    initIcons();
                } catch (e) {
                    placeholder.innerHTML = '<div class="text-red-400 text-[12px] font-bold">上传失败</div>';
                }
            }
            input.value = '';
        }

        async function completeOrder() {
            if (!confirm("确认完工？")) return;
            try { 
                const res = await fetch(`${API_BASE_URL}/orders/${orderId}/complete`, { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify({ 
                        repair_notes: document.getElementById('repairNotes').value,
                        photos: uploadedPhotos
                    }) 
                }); 
                if (res.ok) location.reload(); 
            } catch (e) {}
        }
        window.onload = () => { fetchDetail(); fetchUsers(); };
    </script>
</body>

</html>
