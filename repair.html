<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>设备报修 - 快速响应</title>
    <!-- Assets -->
    <script src="/static/js/tailwind.min.js"></script>
    <script src="/static/js/lucide.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            600: '#2563eb',
                        },
                        surface: '#f8fafc',
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #f1f5f9; color: #0f172a; -webkit-tap-highlight-color: transparent; }
        
        .ui-label {
            font-size: 14px; font-weight: 900; color: #2563eb; text-transform: uppercase;
            letter-spacing: 0.05em; margin-bottom: 4px; display: block;
        }

        .ui-content {
            font-size: 14px; font-weight: 700; color: #0f172a;
        }

        .ui-input {
            width: 100%; background-color: white; border: 1px solid #e2e8f0; border-radius: 16px;
            padding: 16px; font-size: 14px; font-weight: 700; color: #0f172a; outline: none; transition: all 0.2s;
        }
        .ui-input:focus { border-color: #2563eb; box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }

        .ui-button-primary {
            width: 100%; background-color: #2563eb; color: white; font-size: 17px; font-weight: 900;
            padding: 20px; border-radius: 20px; transition: all 0.2s; display: flex; align-items: center; justify-content: center;
            gap: 8px; box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.2);
        }
        .ui-button-primary:active { transform: scale(0.98); }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .safe-area-inset-bottom { padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>

<body class="font-sans antialiased">
    <div class="max-w-md mx-auto min-h-screen bg-surface flex flex-col shadow-xl relative pb-40">
        
        <!-- Header -->
        <header class="sticky top-0 z-30 bg-white/80 backdrop-blur-md border-b border-slate-100 px-5 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <button onclick="history.back()" class="p-2 -ml-2 text-slate-900">
                    <i data-lucide="chevron-left" class="w-6 h-6"></i>
                </button>
                <h1 class="text-[17px] font-black text-slate-900 tracking-tight">异常报修申请</h1>
            </div>
            <div class="bg-brand-600 text-white px-3 py-1 rounded-full text-[14px] font-black uppercase tracking-widest">实时处理</div>
        </header>

        <form id="repairForm" class="flex-1 flex flex-col">
            <!-- Banner Section -->
            <div class="px-5 pt-6">
                <div class="bg-brand-600 rounded-3xl p-6 text-white shadow-lg shadow-brand-100">
                    <div class="flex items-center gap-3 mb-2">
                        <i data-lucide="alert-circle" class="w-6 h-6 text-white"></i>
                        <h2 class="text-[17px] font-black">故障上报中心</h2>
                    </div>
                    <p class="text-white text-[14px] font-medium leading-relaxed">提交报修后，系统将秒级分发至对应维修班组，请保持现场描述清晰。</p>
                </div>
            </div>

            <!-- Device Info (Single Column) -->
            <div class="px-5 pt-8 space-y-6">
                <div class="bg-white rounded-3xl border border-slate-100 p-6 shadow-sm space-y-6">
                    <div>
                        <span class="ui-label">涉及故障设备</span>
                        <p id="deviceName" class="ui-content text-[17px]">--</p>
                    </div>
                    <div>
                        <span class="ui-label">设备序列号</span>
                        <p id="deviceSn" class="ui-content font-mono">--</p>
                    </div>
                    <div>
                        <span class="ui-label">指派维修负责人</span>
                        <div class="flex items-center gap-2 mt-1">
                            <i data-lucide="user-check" class="w-4 h-4 text-brand-600"></i>
                            <p id="leaderName" class="ui-content">--</p>
                            <input type="hidden" id="leaderId">
                        </div>
                    </div>
                </div>
            </div>

            <!-- Inputs (Single Column) -->
            <div class="px-5 pt-8 space-y-8">
                <div class="space-y-2">
                    <span class="ui-label">报修人员登记</span>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-4 flex items-center pointer-events-none">
                            <i data-lucide="search" class="w-5 h-5 text-brand-600"></i>
                        </div>
                        <input type="text" id="reporterSearch" autocomplete="off" class="ui-input pl-12" placeholder="输入姓名快速搜索...">
                        <ul id="reporterList" class="hidden absolute top-full left-0 right-0 bg-white border border-slate-100 rounded-2xl mt-2 z-50 max-h-56 overflow-y-auto shadow-2xl no-scrollbar"></ul>
                    </div>
                    <input type="hidden" id="reporterId" required>
                </div>

                <div class="space-y-2">
                    <span class="ui-label">具体故障现象详述</span>
                    <textarea id="description" required rows="5" class="ui-input resize-none" placeholder="请详细描述故障现象、发生部位及可能的诱因..."></textarea>
                </div>
            </div>
        </form>

        <!-- Footer -->
        <div class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white/95 backdrop-blur-xl border-t border-slate-100 p-5 safe-area-inset-bottom z-40">
            <button type="submit" form="repairForm" id="submitBtn" class="ui-button-primary">
                <i data-lucide="send" class="w-6 h-6"></i>
                <span>报修提交</span>
            </button>
        </div>
    </div>

    <script>
        const API_BASE_URL = window.location.origin;
        const deviceId = window.location.pathname.split('/').pop();
        let usersList = [];
        const searchInput = document.getElementById('reporterSearch');
        const searchList = document.getElementById('reporterList');
        const hiddenIdInput = document.getElementById('reporterId');

        function initIcons() { if (typeof lucide !== 'undefined') lucide.createIcons(); }
        async function init() {
            initIcons();
            try {
                const [devRes, userRes] = await Promise.all([ fetch(`${API_BASE_URL}/devices/${deviceId}`), fetch(`${API_BASE_URL}/users/`) ]);
                if (devRes.ok) {
                    const dev = await devRes.json();
                    document.getElementById('deviceName').textContent = dev.name || '--';
                    document.getElementById('deviceSn').textContent = dev.sn || '--';
                    const leaderName = dev.maintenance_leader || "未指定班长";
                    document.getElementById('leaderName').textContent = leaderName;
                    if (userRes.ok) {
                        usersList = await userRes.json();
                        const leader = usersList.find(u => u.name === leaderName);
                        if (leader) document.getElementById('leaderId').value = leader.id;
                    }
                }
            } catch (e) { alert("基础信息加载异常"); }
        }

        searchInput.oninput = (e) => {
            const kw = e.target.value.trim().toLowerCase();
            if (!kw) { searchList.classList.add('hidden'); return; }
            const matches = usersList.filter(u => u.name.toLowerCase().includes(kw));
            if (matches.length > 0) {
                searchList.innerHTML = matches.map(u => `
                    <li onclick="selectUser('${u.id}', '${u.name}')" class="p-5 hover:bg-slate-50 border-b border-slate-50 cursor-pointer flex items-center justify-between group">
                        <span class="font-black text-slate-900 text-[14px] group-hover:text-brand-600 transition-colors">${u.name}</span>
                        <i data-lucide="check" class="w-5 h-5 text-brand-600"></i>
                    </li>
                `).join('');
                searchList.classList.remove('hidden'); initIcons();
            } else { searchList.classList.add('hidden'); }
        };
        function selectUser(id, name) { hiddenIdInput.value = id; searchInput.value = name; searchList.classList.add('hidden'); }
        document.onclick = (e) => { if (e.target !== searchInput) searchList.classList.add('hidden'); };

        document.getElementById('repairForm').onsubmit = async (e) => {
            e.preventDefault(); const btn = document.getElementById('submitBtn');
            const leaderId = document.getElementById('leaderId').value;
            const reporterId = document.getElementById('reporterId').value;
            if (!reporterId) return alert("请选择报修人"); if (!leaderId) return alert("无法关联负责班组");
            btn.disabled = true; btn.innerHTML = '<div class="w-6 h-6 border-4 border-white/30 border-t-white rounded-full animate-spin"></div>';
            try {
                const res = await fetch(`${API_BASE_URL}/repair/`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ device_id: deviceId, reporter_id: reporterId, leader_id: leaderId, description: document.getElementById('description').value }) });
                if (res.ok) { btn.innerHTML = '报修成功'; btn.classList.add('bg-emerald-500'); setTimeout(() => { window.location.href = `/inspect/${deviceId}`; }, 1500); }
                else throw new Error();
            } catch (err) { alert("提交失败"); btn.disabled = false; btn.innerHTML = '重试提交'; }
        };
        window.onload = init;
    </script>
</body>

</html>
